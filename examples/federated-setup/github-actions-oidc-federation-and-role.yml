---
AWSTemplateFormatVersion: "2010-09-09"
Description: Github Actions configuration - OIDC IAM IdP and associated role CI/CD

Parameters:

  GitHubOrganization:
    Type: String
    Description: This is the root organization or personal account where repos are stored (Case Sensitive)

  GitHubOrganizationId:
    Type: String
    Description: >-
      Numeric GitHub organization (or user) ID, embedded in the OIDC sub claim
      of repos created after GitHub's immutable-ID rollout. Find it with:
      gh api /orgs/<org> --jq .id (use * to match any, at the cost of rename protection)
    Default: "*"

  RepositoryName:
    Type: String
    Description: The repo(s) these roles will have access to. (Use * for all org or personal repos)
    Default: "*"

  RepositoryId:
    Type: String
    Description: >-
      Numeric GitHub repository ID, embedded in the OIDC sub claim of repos
      created after GitHub's immutable-ID rollout. Find it with:
      gh api /repos/<org>/<repo> --jq .id (use * to match by repo name only)
    Default: "*"

  BranchName:
    Type: String
    Description: Name of the git branch to to trust. (Use * for all branches)
    Default: "*"

  RoleName:
    Type: String
    Description: Name the Role

  UseExistingProvider:
    Type: String
    Description: "Only one GitHub Provider can exists. Choose yes if one is already present in account"
    Default: "no"
    AllowedValues:
      - "yes"
      - "no"

Conditions:

  CreateProvider: !Equals ["no", !Ref UseExistingProvider]

Resources:

  IdpGitHubOidc:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
        - !Sub https://github.com/${GitHubOrganization}/${RepositoryName}
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
      Tags:
        - Key: Name
          Value: !Sub ${RoleName}-OIDC-Provider

  RoleGithubActions:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Statement:
          - Effect: Allow
            Action: sts:AssumeRoleWithWebIdentity
            Principal:
              Federated: !If
                - CreateProvider
                - !Ref IdpGitHubOidc
                - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: "sts.amazonaws.com"
              StringLike:
                token.actions.githubusercontent.com:sub:
                  # Classic sub format (repos created before GitHub's
                  # immutable-ID rollout on July 15, 2026)
                  - !Sub repo:${GitHubOrganization}/${RepositoryName}:ref:refs/heads/${BranchName}
                  # Immutable-ID sub format (repos created after the rollout):
                  # repo:<org>@<org-id>/<repo>@<repo-id>:ref:refs/heads/<branch>
                  - !Sub repo:${GitHubOrganization}@${GitHubOrganizationId}/${RepositoryName}@${RepositoryId}:ref:refs/heads/${BranchName}
      ManagedPolicyArns:
        ## edit the managed policy to give least privileges
        - !Sub arn:${AWS::Partition}:iam::aws:policy/AdministratorAccess

Outputs:

  IdpGitHubOidc:
    Condition: CreateProvider
    Description: "ARN of Github OIDC Provider"
    Value: !GetAtt IdpGitHubOidc.Arn

  RoleGithubActionsARN:
    Description: "CICD Role for GitHub Actions"
    Value: !GetAtt RoleGithubActions.Arn
